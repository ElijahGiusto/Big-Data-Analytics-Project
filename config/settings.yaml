# =============================================================================
# Pipeline Configuration
# =============================================================================

pipeline:
  batch_size: 10          # Number of concurrent API requests
  max_retries: 3          # Retry attempts for failed API calls
  retry_delay: 2          # Seconds between retries
  request_timeout: 10     # Seconds before request times out

# Sources are explicitly enabled so restricted or low-value APIs do not
# leak into the default portfolio run. Spotify remains available as an
# optional catalog source, but it is not part of the default analytics.
sources:
  enabled:
    spotify: false
    lastfm: true
    deezer: true
    musicbrainz: true
    listenbrainz: true
    wikimedia: true
    theaudiodb: true
    itunes: true
    wikidata: true

# =============================================================================
# Platform API Configuration
# =============================================================================

spotify:
  auth_url: "https://accounts.spotify.com/api/token"
  base_url: "https://api.spotify.com/v1"
  search_endpoint: "/search"
  artist_endpoint: "/artists"

lastfm:
  base_url: "http://ws.audioscrobbler.com/2.0/"

deezer:
  base_url: "https://api.deezer.com"
  search_endpoint: "/search/artist"

musicbrainz:
  base_url: "https://musicbrainz.org/ws/2"

listenbrainz:
  base_url: "https://api.listenbrainz.org"
  range: "all_time"
  top_listener_count: 25

wikimedia:
  search_url: "https://en.wikipedia.org/w/api.php"
  pageviews_url: "https://wikimedia.org/api/rest_v1/metrics/pageviews"
  project: "en.wikipedia"
  access: "all-access"
  agent: "user"
  months_back: 3
  page_title_overrides:
    Ado: "Ado (singer)"
    Bjork: "Björk"
    Blur: "Blur (band)"
    Ghost: "Ghost (Swedish band)"
    Gojira: "Gojira (band)"
    Laufey: "Laufey (singer)"
    MF DOOM: "MF Doom"
    PornoGraffitti: "Porno Graffitti"
    Sigur Ros: "Sigur Rós"
    Tool: "Tool (band)"
    Tyler the Creator: "Tyler, the Creator"

theaudiodb:
  base_url: "https://www.theaudiodb.com/api/v1/json"
  api_key: "123"

itunes:
  search_url: "https://itunes.apple.com/search"
  country: "US"
  min_interval_seconds: 3.1
  cache_path: "data/cache/itunes_artist_cache.json"

wikidata:
  api_url: "https://www.wikidata.org/w/api.php"

# =============================================================================
# Storage Configuration
# =============================================================================

storage:
  mode: "local"
  raw_path: "data/raw"
  processed_path: "data/processed"
  hdfs_uri: "hdfs://localhost:9000"
  hdfs_processed_path: "/artist-popularity/processed"

